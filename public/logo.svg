<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Left accent mark -->
  <rect x="0" y="8" width="6" height="32" rx="1" fill="#81ad10"/>

  <!-- "i-" bold text block -->
  <rect x="12" y="8" width="40" height="32" rx="2" fill="#080145"/>
  <text x="32" y="31" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="20" fill="white" text-anchor="middle">i-</text>

  <!-- "REMIT" lettering -->
  <text x="62" y="31" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="22" fill="#080145" letter-spacing="1">REMIT</text>

  <!-- Green underline accent -->
  <rect x="62" y="37" width="148" height="3" rx="1" fill="#81ad10"/>
</svg>
